<svg width="348" height="80" xmlns="http://www.w3.org/2000/svg">
<defs>
  <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  <filter id="glow-soft" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="1" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  <pattern id="scanlines" x="0" y="0" width="348" height="3" patternUnits="userSpaceOnUse">
    <rect x="0" y="0" width="348" height="1" fill="rgba(0,0,0,0.22)"/>
  </pattern>
  <style>
    text {
      font-family: "Courier New", Courier, monospace;
      letter-spacing: 0.08em;
    }
    .hdr   { font-size: 9px;  fill: #1d5c27; font-weight: bold; }
    .sys   { font-size: 9px;  fill: #1d5c27; text-anchor: end; }
    .book  { font-size: 12px; fill: #57ff6e; }
    .pages { font-size: 11px; fill: #1d5c27; text-anchor: end; font-weight: bold; }
  </style>
</defs>
<rect width="348" height="80" fill="#040904"/>
<rect x="0.5" y="0.5" width="347" height="79" fill="none" stroke="#1a4020" stroke-width="1"/>
<rect x="3.5" y="3.5" width="341" height="73" fill="none" stroke="#0e2614" stroke-width="0.5"/>
<polyline points="4,10 4,4 10,4" fill="none" stroke="#1d5c27" stroke-width="1"/>
<polyline points="344,10 344,4 338,4" fill="none" stroke="#1d5c27" stroke-width="1"/>
<polyline points="4,70 4,76 10,76" fill="none" stroke="#1d5c27" stroke-width="1"/>
<polyline points="344,70 344,76 338,76" fill="none" stroke="#1d5c27" stroke-width="1"/>
<g filter="url(#glow)">
<text x="14" y="22" class="hdr">SEVASTOLINK  //  READING LOG</text>
<text x="334" y="22" class="sys">SYS:ACTIVE</text>
</g>
<line x1="14" y1="28" x2="334" y2="28" stroke="#1d5c27" stroke-width="0.5"/>
<g filter="url(#glow-soft)">
<text x="14" y="62" class="book">PROJECT HAIL MARY</text>
<rect x="178" y="53" width="88" height="7" fill="#0a1a0d" stroke="#1d5c27" stroke-width="0.5"/>
<rect x="178" y="53" width="34" height="7" fill="#1d5c27"/>
<rect x="210" y="53" width="2" height="7" fill="#57ff6e"/>
<text x="334" y="62" class="pages">215/543</text>
</g>
<rect width="348" height="80" fill="url(#scanlines)"/>
</svg>